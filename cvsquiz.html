<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardiovascular System Quiz - 80 Questions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    :root {
      --background: #1e1e2f;
      --shadow-in: #171723;
      --shadow-out: #25253b;
      --text: #fff;
      --accent: #1db954;
    }

    body.light {
      --background: #e0e0e0;
      --shadow-in: #bebebe;
      --shadow-out: #ffffff;
      --text: #333;
      --accent: #1db954;
    }

    body {
      background: var(--background);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--background);
      border-radius: 20px;
      box-shadow: 10px 10px 20px var(--shadow-in), -10px -10px 20px var(--shadow-out);
      overflow: hidden;
      position: relative;
      height: 700px;
      overflow-y: auto;
      padding-top: 70px;
      padding-bottom: 70px;
    }

    .neumorphic {
      background: var(--background);
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      border-radius: 15px;
    }

    .neumorphic-btn {
      background: var(--background);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
    }

    .neumorphic-btn:active {
      box-shadow: inset 3px 3px 6px var(--shadow-in), inset -3px -3px 6px var(--shadow-out);
    }

    /* Top Fixed Container */
    .top-bar {
      position: fixed;
      top: 0;
      width: 100%;
      max-width: 400px;
      background: var(--background);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 5px 10px var(--shadow-in);
      z-index: 20;
    }

    .top-bar .header {
      font-size: 18px;
      font-weight: bold;
      color: var(--text);
    }

    .top-bar .right-icons {
      display: flex;
      gap: 10px;
    }

    .top-bar .profile-upload {
      position: relative;
    }

    .top-bar .profile-upload input {
      opacity: 0;
      position: absolute;
      width: 40px;
      height: 40px;
      cursor: pointer;
    }

    /* Question Container */
    .question-container {
      margin: 60px 10px 60px 10px;
      padding: 20px;
      background: var(--background);
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
    }

    .timer {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 16px;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      background: var(--background);
      border-radius: 10px;
      padding: 15px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option.selected {
      border: 2px solid var(--accent);
      box-shadow: inset 2px 2px 5px var(--shadow-in), inset -2px -2px 5px var(--shadow-out);
    }

    .option.correct {
      border: 2px solid #27ae60;
      background: rgba(39, 174, 96, 0.1);
    }

    .option.incorrect {
      border: 2px solid #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    .option p {
      font-size: 14px;
      color: #b3b3b3;
      margin: 0;
    }

    body.light .option p {
      color: #666;
    }

    .option-letter {
      font-weight: bold;
      color: var(--accent);
      margin-right: 5px;
    }

    /* Navigation Buttons */
    .nav-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      margin: 10px 10px;
    }

    .prev-btn, .next-btn {
      background: var(--background);
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      color: var(--text);
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .prev-btn:hover, .next-btn:hover {
      transform: translateY(-2px);
    }

    .prev-btn {
      border-radius: 20px 0 0 20px;
    }

    .next-btn {
      border-radius: 0 20px 20px 0;
    }

    .prev-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .center-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px var(--accent), 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .center-btn:hover {
      transform: scale(1.1);
    }

    /* Pop-up for Question Selection */
    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--background);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      z-index: 30;
      max-width: 340px;
      width: 90%;
    }

    .popup-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-bottom: 20px;
      max-height: 350px;
      overflow-y: auto;
    }

    .popup-grid button {
      background: var(--background);
      border: none;
      padding: 8px 4px;
      border-radius: 8px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      color: var(--text);
      font-size: 11px;
      transition: all 0.2s ease;
    }

    .popup-grid button:hover {
      transform: scale(1.1);
    }

    .popup-grid button.answered {
      background: var(--accent);
      color: #fff;
    }

    .popup-grid button.current {
      border: 2px solid var(--accent);
    }

    /* Results Pop-up */
    .results-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--background);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      z-index: 30;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }

    .results-popup .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--background);
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
      position: relative;
    }

    .score-circle::before {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--background);
      box-shadow: inset 3px 3px 6px var(--shadow-in), inset -3px -3px 6px var(--shadow-out);
    }

    .score-text {
      position: relative;
      z-index: 1;
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
    }

    .results-popup h2 {
      font-size: 20px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .results-popup h3 {
      font-size: 14px;
      color: #b3b3b3;
      margin-bottom: 20px;
    }

    body.light .results-popup h3 {
      color: #666;
    }

    .results-popup button {
      background: var(--accent);
      border: none;
      padding: 10px 20px;
      border-radius: 15px;
      color: #fff;
      cursor: pointer;
      margin: 5px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
    }

    /* Details Page */
    .details-page {
      display: none;
      margin: 90px 10px 90px 10px;
      padding: 20px;
      background: var(--background);
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      max-height: 520px;
      overflow-y: auto;
    }

    .details-page h3 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .details-page h3:first-child {
      margin-top: 0;
    }

    .details-page p {
      font-size: 14px;
      color: #b3b3b3;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    body.light .details-page p {
      color: #666;
    }

    .details-page .correct {
      color: #27ae60;
      font-weight: bold;
    }

    .details-page .incorrect {
      color: #e74c3c;
      font-weight: bold;
    }

    .details-page .explanation {
      background: var(--background);
      padding: 10px;
      border-radius: 10px;
      box-shadow: inset 2px 2px 5px var(--shadow-in), inset -2px -2px 5px var(--shadow-out);
      margin-top: 10px;
      font-style: italic;
    }

    .details-page button {
      background: var(--accent);
      border: none;
      padding: 10px 20px;
      border-radius: 15px;
      color: #fff;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
    }

    /* Footer Nav Bar */
    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 400px;
      background: var(--background);
      padding: 10px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -5px 10px var(--shadow-in);
      z-index: 20;
    }

    .nav-bar .nav-item {
      text-align: center;
      position: relative;
    }

    .nav-bar .nav-item button {
      width: 40px;
      height: 40px;
      font-size: 18px;
    }

    .nav-bar .nav-item.center button {
      width: 50px;
      height: 50px;
      font-size: 24px;
      background: var(--accent);
      box-shadow: 0 0 15px var(--accent), 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
    }

    .nav-bar .nav-item.active button {
      background: var(--accent);
      box-shadow: inset 3px 3px 6px var(--shadow-in), inset -3px -3px 6px var(--shadow-out);
    }

    .nav-bar .nav-item p {
      display: none;
      font-size: 12px;
      margin-top: 5px;
      color: var(--text);
    }

    .nav-bar .nav-item.active p {
      display: block;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--background);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--shadow-in);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* Section indicator */
    .section-indicator {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Progress bar */
    .progress-container {
      width: 100%;
      height: 6px;
      background: var(--shadow-in);
      border-radius: 3px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
  </style>
</head>

  <script>
    // Complete Quiz Data - 80 Cardiovascular System Questions
    const quizData = [
      // SECTION 1: INTRODUCTION TO THE CARDIOVASCULAR SYSTEM (Questions 1-5)
      {
        question: "Which of the following is NOT a component of the cardiovascular system?",
        options: ["The heart", "Blood vessels", "Lymphatic vessels", "The spleen"],
        correct: 3,
        reason: "The cardiovascular system comprises the heart, blood, blood vessels, and lymphatic vessels. The spleen is part of the lymphatic/immune system but is not classified as a core component of the cardiovascular system itself.",
        section: "Introduction to the Cardiovascular System"
      },
      {
        question: "What is the primary function of the cardiovascular system regarding tissue supply?",
        options: ["Transport hormones only", "Supply oxygen and nutrients while removing metabolic waste", "Regulate body temperature only", "Protect against all diseases"],
        correct: 1,
        reason: "While the cardiovascular system has multiple functions (transportation, protection, temperature regulation, hormone transport), its primary tissue-level function is delivering oxygen and nutrients to tissues and removing waste products of metabolism.",
        section: "Introduction to the Cardiovascular System"
      },
      {
        question: "Which of the following is a function of the cardiovascular system?",
        options: ["Production of red blood cells", "Transport of hormones and other chemicals", "Digestion of fats", "Filtration of urine"],
        correct: 1,
        reason: "The cardiovascular system transports hormones and other chemicals throughout the body. Red blood cell production (erythropoiesis) occurs in bone marrow, fat digestion occurs in the digestive system, and urine filtration occurs in the kidneys.",
        section: "Introduction to the Cardiovascular System"
      },
      {
        question: "The cardiovascular system helps regulate body temperature through:",
        options: ["Constriction and dilation of blood vessels", "Increasing heart rate only", "Producing sweat glands", "Storing fat"],
        correct: 0,
        reason: "Blood vessels can constrict (vasoconstriction) to conserve heat or dilate (vasodilation) to release heat, thereby helping regulate body temperature. This is one of the protective and regulatory functions of the system.",
        section: "Introduction to the Cardiovascular System"
      },
      {
        question: "How does the cardiovascular system protect the body?",
        options: ["By producing antibodies directly", "Against foreign molecules and diseases, and through clotting mechanisms", "By filtering all bacteria in the blood", "By increasing blood pressure constantly"],
        correct: 1,
        reason: "Protection includes defense against foreign molecules and diseases (via immune components in blood) and clotting mechanisms to prevent excessive blood loss. While blood contains immune cells, antibodies are produced by lymphocytes, and the cardiovascular system doesn't filter all bacteria or maintain constantly high pressure.",
        section: "Introduction to the Cardiovascular System"
      },
      
      // SECTION 2: ANATOMY OF THE HEART (Questions 6-20)
      {
        question: "Where is the heart located?",
        options: ["Left side of the abdominal cavity", "Middle mediastinum of the thoracic cavity", "Right side of the chest only", "Posterior to the spine"],
        correct: 1,
        reason: "The heart is located in the middle mediastinum of the thoracic cavity, not the abdominal cavity. It sits slightly left of center but spans both sides, with its base facing posteriorly.",
        section: "Anatomy of the Heart"
      },
      {
        question: "What is the approximate size of the human heart?",
        options: ["Size of a football", "Size of a fist", "Size of a tennis ball", "Size of a golf ball"],
        correct: 1,
        reason: "The heart is approximately the size of a fist. This makes sense given its function as a powerful muscular pump that needs substantial force to circulate blood throughout the entire body.",
        section: "Anatomy of the Heart"
      },
      {
        question: "The inferior surface of the heart sits on:",
        options: ["The lungs", "The sternum", "The central crux of the diaphragm", "The liver"],
        correct: 2,
        reason: "The inferior surface of the heart rests on the central crux of the diaphragm, the major muscle of respiration. This positioning allows for mechanical interaction between heartbeats and breathing movements.",
        section: "Anatomy of the Heart"
      },
      {
        question: "Which structure lies immediately anterior to the esophagus and posterior to the descending aorta?",
        options: ["The apex of the heart", "The base of the heart", "The right ventricle", "The pericardium"],
        correct: 1,
        reason: "The base of the heart faces posteriorly and lies immediately anterior to the esophagus and posterior to the descending aorta. This anatomical relationship is important during surgical procedures and imaging studies.",
        section: "Anatomy of the Heart"
      },
      {
        question: "Which layer of the heart is described as the outer protective layer?",
        options: ["Myocardium", "Endocardium", "Pericardium", "Epicardium"],
        correct: 2,
        reason: "The pericardium is the outer layer of the heart that protects the heart and provides potential space for chamber filling and emptying. While epicardium is part of the pericardium (visceral layer), pericardium is the correct term for the complete outer layer.",
        section: "Anatomy of the Heart"
      },
      {
        question: "How many layers does the pericardium have?",
        options: ["One layer", "Two layers", "Three layers", "Four layers"],
        correct: 1,
        reason: "The pericardium has two layers: the visceral layer (inner, attached to heart) and the parietal layer (outer, forming the sac). These layers are continuous with each other as they reflect off major vessels behind and above the heart.",
        section: "Anatomy of the Heart"
      },
      {
        question: "The pericardium blends with all of the following EXCEPT:",
        options: ["Adventitia of the aorta", "Pulmonary trunk", "Left atrium", "Central tendon of the diaphragm"],
        correct: 2,
        reason: "The pericardium blends with the adventitia of the aorta, pulmonary trunk, superior vena cava, and central tendon of the diaphragm. It does not blend with the left atrium itself; rather, it surrounds the heart as an external sac.",
        section: "Anatomy of the Heart"
      },
      {
        question: "Which layer of the heart wall is composed of muscle fibers enabling contraction?",
        options: ["Pericardium", "Endocardium", "Myocardium", "Tunica media"],
        correct: 2,
        reason: "The myocardium is the middle layer of the heart wall composed of cardiac muscle fibers that enable heart contraction. This is the thickest layer and the actual pumping mechanism of the heart.",

      },
      {
        question: "Why is the myocardium of the left ventricle the thickest?",
        options: ["Because it receives deoxygenated blood", "Because it generates power to pump oxygenated blood to the entire body", "Because it pumps blood only to the lungs", "Because it has less work to do than the right ventricle"],
        correct: 1,
        reason: "The left ventricle must generate much higher pressure (systemic pressure) to pump oxygenated blood through the aorta to the entire body, compared to the right ventricle which only pumps to the nearby lungs (pulmonary pressure, about 1/5 of systemic pressure).",
        section: "Anatomy of the Heart"
      },
      {
        question: "The endocardium contains which specialized fibers?",
        options: ["Collagen fibers only", "Purkinje fibers", "Elastic fibers only", "Smooth muscle fibers"],
        correct: 1,
        reason: "The endocardium contains Purkinje fibers, which are specialized conductive tissue fibers that convey electrical impulses causing the heart to contract. These are part of the cardiac conduction system.",
        section: "Anatomy of the Heart"
      },
      {
        question: "What type of cells make up the endocardium?",
        options: ["Muscle cells", "Nerve cells", "Epithelial cells", "Bone cells"],
        correct: 2,
        reason: "The endocardium is a thin membrane made of epithelial cells that lines the inner heart, covers the valves, and contains the Purkinje fibers. This smooth lining prevents blood clot formation and provides an ideal surface for blood flow.",
        section: "Anatomy of the Heart"
      },
      {
        question: "How many chambers does the heart have?",

        correct: 2,
        reason: "The heart has four chambers: right atrium, left atrium, right ventricle, and left ventricle. This four-chambered structure allows complete separation of oxygenated and deoxygenated blood.",

      },
      {
        question: "What separates the right and left atria?",
        options: ["Interventricular septum", "Interatrial septum", "Bundle of His", "AV node"],
        correct: 1,
        reason: "The interatrial septum is the wall that separates the right and left atria. The interventricular septum separates the ventricles. These septa prevent mixing of oxygenated and deoxygenated blood.",

      },
      {
        question: "What separates the right and left ventricles?",
        options: ["Interatrial septum", "Interventricular septum", "Pericardial septum", "Mediastinal septum"],
        correct: 1,
        reason: "The interventricular septum separates the right and left ventricles. It is a thick muscular wall that prevents mixing of blood between the two ventricles and forms part of the electrical insulation between atria and ventricles.",
        section: "Anatomy of the Heart"
      },
      {
        question: "Which statement about the visceral and parietal pericardial layers is CORRECT?",
        options: ["They are completely separate structures", "They are continuous with each other at the great vessels", "They never touch each other", "They are separated by the myocardium"],
        correct: 1,
        reason: "Both visceral and parietal layers are continuous with each other as they reflect off the major vessels behind and above the heart. This continuity creates the pericardial space between them.",
        section: "Anatomy of the Heart"

        div.innerHTML = `<p><span class="option-letter">${letter})</span> ${option}</p>`;
        
        div.addEventListener('click', () => {
          document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
          div.classList.add('selected');
          answers[currentQuestion] = index;
          updatePopup();
        });
        optionsContainer.appendChild(div);
      });
      
      prevBtn.disabled = currentQuestion === 0;
      nextBtn.textContent = currentQuestion === quizData.length - 1 ? 'Submit' : 'Next';
      updateProgress();
    }

    // Render Question Selection Pop-up
    function renderPopup() {
      popupGrid.innerHTML = '';
      quizData.forEach((_, index) => {
        const btn = document.createElement('button');
        btn.textContent = index + 1;
        if (answers[index] !== null) btn.classList.add('answered');
        if (index === currentQuestion) btn.classList.add('current');
        btn.addEventListener('click', () => {
          currentQuestion = index;
          renderQuestion();
          questionPopup.style.display = 'none';
        });
        popupGrid.appendChild(btn);
      });
    }

    function updatePopup() {
      renderPopup();
    }

    // Submit Quiz
    function submitQuiz() {
      clearInterval(timerInterval);
      const score = answers.reduce((sum, answer, i) => answer === quizData[i].correct ? sum + 1 : sum, 0);
      
      questionContainer.style.display = 'none';
      document.querySelector('.nav-buttons').style.display = 'none';
      document.querySelector('.section-indicator').style.display = 'none';
      resultsPopup.style.display = 'block';
      
      document.getElementById('score-text').textContent = `${score}/${quizData.length}`;
      
      const percentage = (score / quizData.length) * 100;
      let performanceText = '';
      if (percentage >= 90) performanceText = 'Outstanding! Medical school ready!';
      else if (percentage >= 80) performanceText = 'Excellent! Great understanding of CV system.';
      else if (percentage >= 70) performanceText = 'Good work! Solid foundation.';
      else if (percentage >= 60) performanceText = 'Passing. Review cardiac conduction & pathways.';
      else performanceText = 'Keep studying! Focus on anatomy & physiology.';
      
      document.getElementById('performance-text').textContent = performanceText;
    }

    // Render Details Page
    function renderDetails() {
      detailsContent.innerHTML = '';
      let currentSection = '';
      
      quizData.forEach((q, i) => {
        if (q.section !== currentSection) {
          currentSection = q.section;
          const sectionHeader = document.createElement('h2');
          sectionHeader.textContent = currentSection;
          sectionHeader.style.color = 'var(--accent)';
          sectionHeader.style.fontSize = '18px';
          sectionHeader.style.marginTop = '30px';
          sectionHeader.style.marginBottom = '15px';
          detailsContent.appendChild(sectionHeader);
        }
        
        const div = document.createElement('div');
        div.style.marginBottom = '25px';
        div.style.padding = '15px';
        div.style.background = 'var(--background)';
        div.style.borderRadius = '10px';
        div.style.boxShadow = 'inset 2px 2px 5px var(--shadow-in), inset -2px -2px 5px var(--shadow-out)';
        
        const isCorrect = answers[i] === q.correct;
        const userAnswer = answers[i] !== null ? q.options[answers[i]] : 'Not answered';
        const correctLetter = String.fromCharCode(65 + q.correct);
        const userLetter = answers[i] !== null ? String.fromCharCode(65 + answers[i]) : '-';
        
        div.innerHTML = `
          <h3>Q${i + 1}: ${q.question}</h3>
          <p>Your Answer: <span class="${isCorrect ? 'correct' : 'incorrect'}">${userLetter}) ${userAnswer} ${isCorrect ? '✓' : '✗'}</span></p>
          <p>Correct Answer: <span class="correct">${correctLetter}) ${q.options[q.correct]} ✓</span></p>
          <div class="explanation">
            <strong>Explanation:</strong> ${q.reason}
          </div>
        `;
        detailsContent.appendChild(div);
      });
    }

    // Event Listeners
    prevBtn.addEventListener('click', () => {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        submitQuiz();
      }
    });

    centerBtn.addEventListener('click', () => {
      renderPopup();
      questionPopup.style.display = 'block';
    });

    questionPopup.querySelector('.close-btn').addEventListener('click', () => {
      questionPopup.style.display = 'none';
    });

    resultsPopup.querySelector('.close-btn').addEventListener('click', () => {
      resultsPopup.style.display = 'none';
      questionContainer.style.display = 'block';
      document.querySelector('.nav-buttons').style.display = 'flex';
      document.querySelector('.section-indicator').style.display = 'block';
    });

    resultsPopup.querySelector('.continue-btn').addEventListener('click', () => {
      resultsPopup.style.display = 'none';
      questionContainer.style.display = 'block';
      document.querySelector('.nav-buttons').style.display = 'flex';
      document.querySelector('.section-indicator').style.display = 'block';
    });

    resultsPopup.querySelector('.details-btn').addEventListener('click', () => {
      resultsPopup.style.display = 'none';
      questionContainer.style.display = 'none';
      document.querySelector('.nav-buttons').style.display = 'none';
      document.querySelector('.section-indicator').style.display = 'none';
      detailsPage.style.display = 'block';
      renderDetails();
    });

    detailsPage.querySelector('.back-btn').addEventListener('click', () => {
      detailsPage.style.display = 'none';
      resultsPopup.style.display = 'block';
    });

    // Theme Toggle
    function setTheme(theme) {
      body.className = theme;
      themeToggle.textContent = theme === 'light' ? '🌙' : '☀';
      localStorage.setItem('theme', theme);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      const newTheme = body.classList.contains('light') ? 'dark' : 'light';
      setTheme(newTheme);
    });

    // Profile Upload
    profileUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          console.log('Profile image uploaded:', e.target.result);
        };
        reader.readAsDataURL(file);
      }
    });

    // Footer Navigation
    const navItems = document.querySelectorAll('.nav-bar .nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        navItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    // Back button
    document.getElementById('back-btn').addEventListener('click', () => {
      if (confirm('Are you sure you want to exit the quiz? Your progress will be lost.')) {
        location.reload();
      }
    });

    // Initialize
    renderQuestion();
  </script>
</body>
</html>
