<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digestive System Quiz - 100 Questions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    :root {
      --background: #1e1e2f;
      --shadow-in: #171723;
      --shadow-out: #25253b;
      --text: #fff;
      --accent: #e67e22;
    }

    body.light {
      --background: #e0e0e0;
      --shadow-in: #bebebe;
      --shadow-out: #ffffff;
      --text: #333;
      --accent: #e67e22;
    }

    body {
      background: var(--background);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--background);
      border-radius: 20px;
      box-shadow: 10px 10px 20px var(--shadow-in), -10px -10px 20px var(--shadow-out);
      overflow: hidden;
      position: relative;
      height: 700px;
      overflow-y: auto;
      padding-top: 70px;
      padding-bottom: 70px;
    }

    .neumorphic {
      background: var(--background);
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      border-radius: 15px;
    }

    .neumorphic-btn {
      background: var(--background);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
    }

    .neumorphic-btn:active {
      box-shadow: inset 3px 3px 6px var(--shadow-in), inset -3px -3px 6px var(--shadow-out);
    }

    /* Top Fixed Container */
    .top-bar {
      position: fixed;
      top: 0;
      width: 100%;
      max-width: 400px;
      background: var(--background);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 5px 10px var(--shadow-in);
      z-index: 20;
    }

    .top-bar .header {
      font-size: 18px;
      font-weight: bold;
      color: var(--text);
    }

    .top-bar .right-icons {
      display: flex;
      gap: 10px;
    }

    .top-bar .profile-upload {
      position: relative;
    }

    .top-bar .profile-upload input {
      opacity: 0;
      position: absolute;
      width: 40px;
      height: 40px;
      cursor: pointer;
    }

    /* Question Container */
    .question-container {
      margin: 60px 10px 60px 10px;
      padding: 20px;
      background: var(--background);
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
    }

    .timer {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 16px;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      background: var(--background);
      border-radius: 10px;
      padding: 15px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option.selected {
      border: 2px solid var(--accent);
      box-shadow: inset 2px 2px 5px var(--shadow-in), inset -2px -2px 5px var(--shadow-out);
    }

    .option.correct {
      border: 2px solid #27ae60;
      background: rgba(39, 174, 96, 0.1);
    }

    .option.incorrect {
      border: 2px solid #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    .option p {
      font-size: 14px;
      color: #b3b3b3;
      margin: 0;
    }

    body.light .option p {
      color: #666;
    }

    .option-letter {
      font-weight: bold;
      color: var(--accent);
      margin-right: 5px;
    }

    /* Navigation Buttons */
    .nav-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      margin: 10px 10px;
    }

    .prev-btn, .next-btn {
      background: var(--background);
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      color: var(--text);
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .prev-btn:hover, .next-btn:hover {
      transform: translateY(-2px);
    }

    .prev-btn {
      border-radius: 20px 0 0 20px;
    }

    .next-btn {
      border-radius: 0 20px 20px 0;
    }

    .prev-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .center-btn {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px var(--accent), 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .center-btn:hover {
      transform: scale(1.1);
    }

    /* Pop-up for Question Selection */
    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--background);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      z-index: 30;
      max-width: 340px;
      width: 90%;
    }

    .popup-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      margin-bottom: 20px;
      max-height: 350px;
      overflow-y: auto;
    }

    .popup-grid button {
      background: var(--background);
      border: none;
      padding: 8px 4px;
      border-radius: 8px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
      cursor: pointer;
      color: var(--text);
      font-size: 11px;
      transition: all 0.2s ease;
    }

    .popup-grid button:hover {
      transform: scale(1.1);
    }

    .popup-grid button.answered {
      background: var(--accent);
      color: #fff;
    }

    .popup-grid button.current {
      border: 2px solid var(--accent);
    }

    /* Results Pop-up */
    .results-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--background);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      z-index: 30;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }

    .results-popup .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
    }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--background);
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
      position: relative;
    }

    .score-circle::before {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--background);
      box-shadow: inset 3px 3px 6px var(--shadow-in), inset -3px -3px 6px var(--shadow-out);
    }

    .score-text {
      position: relative;
      z-index: 1;
      font-size: 24px;
      font-weight: bold;
      color: var(--accent);
    }

    .results-popup h2 {
      font-size: 20px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .results-popup h3 {
      font-size: 14px;
      color: #b3b3b3;
      margin-bottom: 20px;
    }

    body.light .results-popup h3 {
      color: #666;
    }

    .results-popup button {
      background: var(--accent);
      border: none;
      padding: 10px 20px;
      border-radius: 15px;
      color: #fff;
      cursor: pointer;
      margin: 5px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
    }

    /* Details Page */
    .details-page {
      display: none;
      margin: 90px 10px 90px 10px;
      padding: 20px;
      background: var(--background);
      border-radius: 15px;
      box-shadow: 5px 5px 10px var(--shadow-in), -5px -5px 10px var(--shadow-out);
      max-height: 520px;
      overflow-y: auto;
    }

    .details-page h3 {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .details-page h3:first-child {
      margin-top: 0;
    }

    .details-page p {
      font-size: 14px;
      color: #b3b3b3;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    body.light .details-page p {
      color: #666;
    }

    .details-page .correct {
      color: #27ae60;
      font-weight: bold;
    }

    .details-page .incorrect {
      color: #e74c3c;
      font-weight: bold;
    }

    .details-page .explanation {
      background: var(--background);
      padding: 10px;
      border-radius: 10px;
      box-shadow: inset 2px 2px 5px var(--shadow-in), inset -2px -2px 5px var(--shadow-out);
      margin-top: 10px;
      font-style: italic;
    }

    .details-page button {
      background: var(--accent);
      border: none;
      padding: 10px 20px;
      border-radius: 15px;
      color: #fff;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
    }

    /* Footer Nav Bar */
    .nav-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 400px;
      background: var(--background);
      padding: 10px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -5px 10px var(--shadow-in);
      z-index: 20;
    }

    .nav-bar .nav-item {
      text-align: center;
      position: relative;
    }

    .nav-bar .nav-item button {
      width: 40px;
      height: 40px;
      font-size: 18px;
    }

    .nav-bar .nav-item.center button {
      width: 50px;
      height: 50px;
      font-size: 24px;
      background: var(--accent);
      box-shadow: 0 0 15px var(--accent), 3px 3px 6px var(--shadow-in), -3px -3px 6px var(--shadow-out);
    }

    .nav-bar .nav-item.active button {
      background: var(--accent);
      box-shadow: inset 3px 3px 6px var(--shadow-in), inset -3px -3px 6px var(--shadow-out);
    }

    .nav-bar .nav-item p {
      display: none;
      font-size: 12px;
      margin-top: 5px;
      color: var(--text);
    }

    .nav-bar .nav-item.active p {
      display: block;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--background);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--shadow-in);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* Section indicator */
    .section-indicator {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Progress bar */
    .progress-container {
      width: 100%;
      height: 6px;
      background: var(--shadow-in);
      border-radius: 3px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
  </style>
</head>

        options: ["Water-soluble iodinated contrast", "Barium sulfate", "Gadolinium", "Carbon dioxide"],
        correct: 1,
        reason: "Barium extravasation causes severe granulomatous peritonitis and adhesions; water-soluble agents are absorbed/excreted if leakage occurs.",
        section: "Accessory Organs & Histology"
      },
      {
        question: "What is the primary advantage of double-contrast barium studies?",
        options: ["Lower radiation dose", "Better mucosal detail and lesion detection", "Faster examination", "Better for motility assessment"],
        correct: 1,
        reason: "Air distension + thin barium coating reveals fine mucosal patterns, early cancers, and small ulcers better than single-contrast.",
        section: "Accessory Organs & Histology"
      },
      {
        question: "Which position is best for detecting hiatal hernia during UGI?",
        options: ["Supine", "Prone", "Left lateral decubitus", "Upright with Valsalva"],
        correct: 3,
        reason: "Upright positioning with Valsalva maneuver increases intra-abdominal pressure, promoting herniation of stomach through diaphragmatic hiatus.",
        section: "Accessory Organs & Histology"
      },
      {
        question: "What is the 'coffee bean sign' on abdominal radiograph?",
        options: ["Gallstone ileus", "Sigmoid volvulus", "Intussusception", "Cecal volvulus"],
        correct: 1,
        reason: "The dilated, twisted sigmoid colon with apposed walls creates the coffee bean appearance, with the 'crease' pointing to the left lower quadrant.",
        section: "Accessory Organs & Histology"
      },
      {
        question: "Which cell junction provides the epithelial barrier function?",
        options: ["Gap junctions", "Tight junctions (zonula occludens)", "Desmosomes", "Hemidesmosomes"],
        correct: 1,
        reason: "Tight junctions seal the apical intercellular space, preventing paracellular passage of luminal contents; their disruption causes 'leaky gut.'",
        section: "Accessory Organs & Histology"
      },
      {
        question: "What is the primary stem cell location in intestinal epithelium?",
        options: ["Villus tip", "Crypt base (position +4 to +5)", "Brunner's glands", "Peyer's patches"],
        correct: 1,
        reason: "Lgr5+ intestinal stem cells at crypt base (above Paneth cells) generate all epithelial lineages; they divide every 24 hours.",
        section: "Accessory Organs & Histology"
      },
      {
        question: "Which immunohistochemical marker is specific for neuroendocrine tumors?",
        options: ["CEA (carcinoembryonic antigen)", "Chromogranin and synaptophysin", "CD45 (leukocyte common antigen)", "Desmin"],
        correct: 1,
        reason: "Chromogranin (secretory granule protein) and synaptophysin (synaptic vesicle protein) confirm neuroendocrine differentiation.",
        section: "Accessory Organs & Histology"
      },
      {
        question: "What is the most common cause of small bowel obstruction in adults without prior surgery?",
        options: ["Adhesions", "Hernias", "Crohn's disease", "Gallstone ileus"],
        correct: 1,
        reason: "In patients without prior abdominal surgery, external hernias (inguinal, femoral, umbilical) are the leading cause; adhesions predominate post-surgically.",
        section: "Accessory Organs & Histology"
      }
    ];

    let currentQuestion = 0;
    let answers = Array(quizData.length).fill(null);
    let timeLeft = 40 * 60; // 120 minutes for 100 questions
    let timerInterval;

    // DOM Elements
    const questionContainer = document.querySelector('.question-container');
    const timerElement = document.querySelector('.timer');
    const questionText = document.querySelector('.question-text');
    const optionsContainer = document.querySelector('.options');
    const prevBtn = document.querySelector('.prev-btn');
    const nextBtn = document.querySelector('.next-btn');
    const centerBtn = document.querySelector('.center-btn');
    const questionPopup = document.getElementById('question-popup');
    const popupGrid = document.querySelector('.popup-grid');
    const resultsPopup = document.getElementById('results-popup');
    const detailsPage = document.getElementById('details-page');
    const detailsContent = document.querySelector('.details-content');
    const themeToggle = document.getElementById('theme-toggle');
    const profileUpload = document.getElementById('profile-upload');
    const body = document.body;
    const sectionIndicator = document.getElementById('section-indicator');
    const progressBar = document.getElementById('progress-bar');

    // Timer
    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerElement.textContent = `Time: ${minutes}m:${seconds.toString().padStart(2, '0')}s`;
      if (timeLeft > 0) {
        timeLeft--;
      } else {
        clearInterval(timerInterval);
        submitQuiz();
      }
    }

    timerInterval = setInterval(updateTimer, 1000);

    // Update Progress Bar
    function updateProgress() {
      const progress = ((currentQuestion + 1) / quizData.length) * 100;
      progressBar.style.width = `${progress}%`;
    }

    // Render Question
    function renderQuestion() {
      const q = quizData[currentQuestion];
      sectionIndicator.textContent = `${q.section} (Q${currentQuestion + 1})`;
      questionText.textContent = `Question ${currentQuestion + 1}: ${q.question}`;
      optionsContainer.innerHTML = '';
      
      q.options.forEach((option, index) => {
        const div = document.createElement('div');
        div.classList.add('option');
        if (answers[currentQuestion] === index) div.classList.add('selected');
        
        const letter = String.fromCharCode(65 + index);
        div.innerHTML = `<p><span class="option-letter">${letter})</span> ${option}</p>`;
        
        div.addEventListener('click', () => {
          document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
          div.classList.add('selected');
          answers[currentQuestion] = index;
          updatePopup();
        });
        optionsContainer.appendChild(div);
      });
      
      prevBtn.disabled = currentQuestion === 0;
      nextBtn.textContent = currentQuestion === quizData.length - 1 ? 'Submit' : 'Next';
      updateProgress();
    }

    // Render Question Selection Pop-up
    function renderPopup() {
      popupGrid.innerHTML = '';
      quizData.forEach((_, index) => {
        const btn = document.createElement('button');
        btn.textContent = index + 1;
        if (answers[index] !== null) btn.classList.add('answered');
        if (index === currentQuestion) btn.classList.add('current');
        btn.addEventListener('click', () => {
          currentQuestion = index;
          renderQuestion();
          questionPopup.style.display = 'none';
        });
        popupGrid.appendChild(btn);
      });
    }

    function updatePopup() {
      renderPopup();
    }

    // Submit Quiz
    function submitQuiz() {
      clearInterval(timerInterval);
      const score = answers.reduce((sum, answer, i) => answer === quizData[i].correct ? sum + 1 : sum, 0);
      
      questionContainer.style.display = 'none';
      document.querySelector('.nav-buttons').style.display = 'none';
      document.querySelector('.section-indicator').style.display = 'none';
      resultsPopup.style.display = 'block';
      
      document.getElementById('score-text').textContent = `${score}/${quizData.length}`;
      
            const percentage = (score / quizData.length) * 100;
      let performanceText = '';
      if (percentage >= 90) performanceText = 'Outstanding! Medical school ready!';
      else if (percentage >= 80) performanceText = 'Excellent! Great understanding of GI system.';
      else if (percentage >= 70) performanceText = 'Good work! Solid foundation.';
      else if (percentage >= 60) performanceText = 'Passing. Review histology & radiography.';
      else performanceText = 'Keep studying! Focus on anatomy & physiology.';
      
      document.getElementById('performance-text').textContent = performanceText;
    }

    // Render Details Page
    function renderDetails() {
      detailsContent.innerHTML = '';
      let currentSection = '';
      
      quizData.forEach((q, i) => {
        if (q.section !== currentSection) {
          currentSection = q.section;
          const sectionHeader = document.createElement('h2');
          sectionHeader.textContent = currentSection;
          sectionHeader.style.color = 'var(--accent)';
          sectionHeader.style.fontSize = '18px';
          sectionHeader.style.marginTop = '30px';
          sectionHeader.style.marginBottom = '15px';
          detailsContent.appendChild(sectionHeader);
        }
        
        const div = document.createElement('div');
        div.style.marginBottom = '25px';
        div.style.padding = '15px';
        div.style.background = 'var(--background)';
        div.style.borderRadius = '10px';
        div.style.boxShadow = 'inset 2px 2px 5px var(--shadow-in), inset -2px -2px 5px var(--shadow-out)';
        
        const isCorrect = answers[i] === q.correct;
        const userAnswer = answers[i] !== null ? q.options[answers[i]] : 'Not answered';
        const correctLetter = String.fromCharCode(65 + q.correct);
        const userLetter = answers[i] !== null ? String.fromCharCode(65 + answers[i]) : '-';
        
        div.innerHTML = `
          <h3>Q${i + 1}: ${q.question}</h3>
          <p>Your Answer: <span class="${isCorrect ? 'correct' : 'incorrect'}">${userLetter}) ${userAnswer} ${isCorrect ? '✓' : '✗'}</span></p>
          <p>Correct Answer: <span class="correct">${correctLetter}) ${q.options[q.correct]} ✓</span></p>
          <div class="explanation">
            <strong>Explanation:</strong> ${q.reason}
          </div>
        `;
        detailsContent.appendChild(div);
      });
    }

    // Event Listeners
    prevBtn.addEventListener('click', () => {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        submitQuiz();
      }
    });

    centerBtn.addEventListener('click', () => {
      renderPopup();
      questionPopup.style.display = 'block';
    });

    questionPopup.querySelector('.close-btn').addEventListener('click', () => {
      questionPopup.style.display = 'none';
    });

    resultsPopup.querySelector('.close-btn').addEventListener('click', () => {
      resultsPopup.style.display = 'none';
      questionContainer.style.display = 'block';
      document.querySelector('.nav-buttons').style.display = 'flex';
      document.querySelector('.section-indicator').style.display = 'block';
    });

    resultsPopup.querySelector('.continue-btn').addEventListener('click', () => {
      resultsPopup.style.display = 'none';
      questionContainer.style.display = 'block';
      document.querySelector('.nav-buttons').style.display = 'flex';
      document.querySelector('.section-indicator').style.display = 'block';
    });

    resultsPopup.querySelector('.details-btn').addEventListener('click', () => {
      resultsPopup.style.display = 'none';
      questionContainer.style.display = 'none';
      document.querySelector('.nav-buttons').style.display = 'none';
      document.querySelector('.section-indicator').style.display = 'none';
      detailsPage.style.display = 'block';
      renderDetails();
    });

    detailsPage.querySelector('.back-btn').addEventListener('click', () => {
      detailsPage.style.display = 'none';
      resultsPopup.style.display = 'block';
    });

    // Theme Toggle
    function setTheme(theme) {
      body.className = theme;
      themeToggle.textContent = theme === 'light' ? '🌙' : '☀';
      localStorage.setItem('theme', theme);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      const newTheme = body.classList.contains('light') ? 'dark' : 'light';
      setTheme(newTheme);
    });

    // Profile Upload
    profileUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          console.log('Profile image uploaded:', e.target.result);
        };
        reader.readAsDataURL(file);
      }
    });

    // Footer Navigation
    const navItems = document.querySelectorAll('.nav-bar .nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        navItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    // Back button
    document.getElementById('back-btn').addEventListener('click', () => {
      if (confirm('Are you sure you want to exit the quiz? Your progress will be lost.')) {
        location.reload();
      }
    });

    // Initialize
    renderQuestion();
  </script>
</body>
</html>
